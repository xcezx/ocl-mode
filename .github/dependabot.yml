version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      # Soak updates for a week before opening PRs: aligns with the weekly
      # schedule and gives time to skip broken/yanked re-releases.
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
